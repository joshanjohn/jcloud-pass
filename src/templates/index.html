<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JCloud-Paas | Welcome</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    
    <link rel="stylesheet" href="{{ url_for('static', path='/style/index.css') }}">
    <script type="module" src="/static/js/auth.js"></script>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass w-full max-w-md rounded-2xl p-8 shadow-2xl border border-white/5 text-center">
        <div class="mb-10">
            <h1 class="text-4xl font-bold text-white tracking-tight mb-2">JCloud <span class="text-blue-500">Paas</span></h1>
            <p class="text-slate-400 text-sm">Welcome back, {{ name }}!</p>
        </div>

        <form id="login-form" class="space-y-6 text-left">
            <div>
                <label for="email" class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-2">Email Address</label>
                <input type="email" id="email" required
                    class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 transition-all"
                    placeholder="Enter email">
            </div>

            <div>
                <label for="password" class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-2">Password</label>
                <input type="password" id="password" required
                    class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 transition-all"
                    placeholder="Password">
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-lg shadow-lg shadow-blue-500/20 transition-all active:scale-[0.98]">
                Login
            </button>
        </form>
        
        <div class="mt-6">
            <a href="/signup" class="text-sm text-blue-400 hover:text-blue-300 transition-colors">Don't have an account? Sign up</a>
        </div>
    </div>
</body>
</html>
