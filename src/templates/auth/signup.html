<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | JCloud</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="{{ url_for('static', path='/style/auth.css') }}">
    <script type="module" src="/static/js/auth.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    
    <div class="auth-card">
        <div class="mb-10 text-center">
            <!-- Logo -->
            <div class="flex items-center justify-center gap-2 mb-6">
                <span class="text-2xl font-bold tracking-tight text-black">JCloud</span>
            </div>
            
            <h1 class="text-2xl font-bold text-gray-900 mb-2">Create an account</h1>
            <p class="text-gray-500 text-sm">Join JCloud to manage your files efficiently</p>
        </div>

        <!-- Signup Form -->
        <form id="signup-form" class="space-y-5">
            <div>
                <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
                <div class="relative">
                    <i data-lucide="mail" class="w-4 h-4 absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="email" id="email" required
                        class="auth-input pl-11"
                        placeholder="name@company.com">
                </div>
            </div>

            <div>
                <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                <div class="relative">
                    <i data-lucide="lock" class="w-4 h-4 absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="password" id="password" required
                        class="auth-input pl-11"
                        placeholder="••••••••">
                </div>
                <p class="mt-2 text-xs text-gray-400">Must be at least 8 characters long</p>
            </div>


            <div class="flex items-start">
                <div class="flex items-center h-5">
                    <input id="terms" type="checkbox" required class="h-4 w-4 rounded border-gray-300 text-black focus:ring-black">
                </div>
                <div class="ml-3 text-sm">
                    <label for="terms" class="text-gray-500">I agree to the <a href="#" class="auth-link">Terms of Service</a> and <a href="#" class="auth-link">Privacy Policy</a></label>
                </div>
            </div>


            <button type="button" id="sign-up" class="auth-button">
                Create Account
            </button>
        </form>

        <div class="mt-8 pt-8 border-t border-white/10 text-center text-sm">
            <p class="text-slate-400">
                Already have an account? 
                <a href="/login" class="text-blue-400 hover:text-blue-300 font-semibold transition-colors ml-1">Sign in</a>
            </p>
        </div>

    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
