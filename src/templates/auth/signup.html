<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | JCloud-Paas</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <link rel="stylesheet" href="{{ url_for('static', path='/style/auth.css') }}">
    <script type="module" src="/static/js/auth.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    
    <div class="glass w-full max-w-md rounded-2xl p-8 shadow-2xl border border-white/5">
        <div class="mb-10 text-center">
            <h1 class="text-4xl font-bold text-white tracking-tight mb-2">Create Account</h1>
            <p class="text-slate-400 text-sm">Join the JCloud ecosystem today</p>
        </div>

        <!-- Sign Up Form -->
        <form id="signup-form" class="space-y-6">
            <div>
                <label for="email" class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-2">Email Address</label>
                <input type="email" id="email" required
                    class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 transition-all"
                    placeholder="name@company.com">
            </div>

            <div>
                <label for="password" class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-2">Password</label>
                <input type="password" id="password" required
                    class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 transition-all"
                    placeholder="••••••••">
            </div>

            <div>
                <label for="confirm-password" class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-2">Confirm Password</label>
                <input type="password" id="confirm-password" required
                    class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 transition-all"
                    placeholder="••••••••">
            </div>

            <button type="button" id="sign-up"
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-lg shadow-lg shadow-blue-500/20 transition-all active:scale-[0.98]">
                Create Account
            </button>
        </form>

        <div class="mt-8 pt-8 border-t border-white/10 text-center text-sm">
            <p class="text-slate-400">
                Already have an account? 
                <a href="/login" class="text-blue-400 hover:text-blue-300 font-semibold transition-colors ml-1">Sign in</a>
            </p>
        </div>
    </div>
</body>
</html>
